<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>RVCAR Locações e Investimentos</title>
  <meta name="description" content="RVCAR Locações e Investimentos — Acesse nosso site, saiba como locar ou como investir." />

  <!-- Open Graph para preview no Instagram / WhatsApp -->
  <meta property="og:title" content="RVCAR Locações e Investimentos" />
  <meta property="og:description" content="Acesse nosso site, saiba como locar ou como investir com a RVCAR." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/favicon.svg" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:   #FFD000;
      --yellow-h: #e6bb00;
      --dark:     #1a1a1a;
      --card:     #2a2a2a;
      --card-h:   #333333;
      --text:     #f5f5f5;
      --muted:    #888;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 20px 32px;
    }

    /* ── Logo ── */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 3px var(--yellow), 0 0 0 6px rgba(255,208,0,.25);
    }
    .avatar svg { width: 80px; height: 80px; }

    /* ── Nome ── */
    .profile { text-align: center; margin-top: 20px; }
    .profile h1 {
      font-size: clamp(1.15rem, 4vw, 1.4rem);
      font-weight: 700;
      letter-spacing: -.01em;
      line-height: 1.3;
    }
    .profile p {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Botões ── */
    .links {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 36px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      border-radius: 14px;
      padding: 18px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: 1.5px solid rgba(255,255,255,.06);
      transition: background .18s, transform .18s, border-color .18s;
      position: relative;
      overflow: hidden;
    }
    .link-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--yellow);
      border-radius: 14px 0 0 14px;
      opacity: 0;
      transition: opacity .18s;
    }
    .link-btn:hover, .link-btn:focus-visible {
      background: var(--card-h);
      border-color: rgba(255,208,0,.3);
      transform: translateY(-2px);
    }
    .link-btn:hover::before, .link-btn:focus-visible::before { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    .link-btn .icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-btn .icon svg { width: 18px; height: 18px; }

    .link-btn .label { flex: 1; text-align: center; padding-right: 36px; /* compensate icon */ }

    /* ── Social ── */
    .social {
      display: flex;
      gap: 16px;
      margin-top: 40px;
      justify-content: center;
    }
    .social a {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: color .18s, border-color .18s;
      text-decoration: none;
    }
    .social a:hover { color: var(--yellow); border-color: var(--yellow); }
    .social a svg { width: 18px; height: 18px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      margin-top: 32px;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--yellow); }

    /* container central */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Logo -->
    <div class="avatar">
      <!-- Logo RVCAR inline -->
      <svg version="1.0" xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 150 150" preserveAspectRatio="xMidYMid meet">
        <rect width="150" height="150" fill="#F4C430"/>
        <g transform="translate(0,150) scale(0.1,-0.1)" fill="#000" stroke="none">
          <path d="M214 954 c-46 -23 -54 -50 -54 -194 0 -140 7 -171 42 -194 31 -20 146 -30 242 -21 107 10 128 29 134 119 l4 67 -35 -21 c-19 -11 -53 -22 -76 -25 -31 -3 -53 -14 -82 -39 -62 -57 -140 -45 -159 23 -15 53 -13 58 30 105 33 35 40 50 40 83 0 26 9 53 25 77 l24 36 -52 0 c-29 0 -66 -7 -83 -16z"/>
          <path d="M612 923 l3 -38 114 -3 c116 -3 141 -10 141 -42 0 -34 -33 -50 -104 -50 -119 0 -156 -38 -156 -160 l0 -70 34 0 34 0 4 71 c4 80 13 91 73 87 39 -3 41 -5 80 -80 l40 -78 54 0 c52 0 57 2 100 48 40 42 213 299 228 339 5 13 -2 14 -38 9 -24 -3 -46 -12 -50 -19 -44 -75 -199 -294 -216 -305 -21 -13 -23 -11 -52 40 l-30 53 23 20 c47 40 59 100 31 154 -24 48 -68 61 -200 61 l-116 0 3 -37z"/>
        </g>
      </svg>
    </div>

    <!-- Nome -->
    <div class="profile">
      <h1>RVCAR Locações e Investimentos</h1>
      <p>@rvcarlocacoeseinvestimentos</p>
    </div>

    <!-- Links -->
    <div class="links">

      <!-- Site -->
      <a href="/" class="link-btn" id="btn-site">
        <span class="icon">
          <!-- Globe icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </span>
        <span class="label">Site</span>
      </a>

      <!-- Sou motorista -->
      <a href="https://wa.me/5547988556370" target="_blank" rel="noopener" class="link-btn">
        <span class="icon">
          <!-- Car icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2"/>
            <path d="M19 17h2a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2"/>
            <rect x="5" y="7" width="14" height="10" rx="1"/>
            <circle cx="7.5" cy="17" r="1.5"/>
            <circle cx="16.5" cy="17" r="1.5"/>
            <path d="M8 7l2-4h4l2 4"/>
          </svg>
        </span>
        <span class="label">Sou Motorista</span>
      </a>

      <!-- Sou investidor -->
      <a href="https://wa.me/5547984485492" target="_blank" rel="noopener" class="link-btn">
        <span class="icon">
          <!-- Chart icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="20" x2="12" y2="10"/>
            <line x1="18" y1="20" x2="18" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="16"/>
          </svg>
        </span>
        <span class="label">Sou Investidor</span>
      </a>

    </div>

    <!-- Redes sociais -->
    <div class="social">
      <!-- Instagram -->
      <a href="https://www.instagram.com/rvcarlocacoeseinvestimentos" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
      </a>
      <!-- WhatsApp -->
      <a href="https://wa.me/5511999999999" target="_blank" rel="noopener" aria-label="WhatsApp" id="whatsapp-link">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.534 5.858L.057 23.786a.5.5 0 0 0 .612.641l6.054-1.463A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.884 0-3.65-.497-5.18-1.367l-.37-.217-3.595.869.899-3.49-.24-.382A9.956 9.956 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
        </svg>
      </a>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; <span id="year"></span> RVCAR Locações e Investimentos</p>
  </footer>

  <script>
    // Ano atual no footer
    document.getElementById('year').textContent = new Date().getFullYear();

    // Ajusta os links para o domínio correto
    const origin = window.location.origin;
    document.getElementById('btn-site').href = origin + '/';

    // Lê o WhatsApp do site se disponível
    fetch(origin + '/api/site-settings')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data) return;
        const settings = data.settings || data;
        const wa = settings.contact_whatsapp?.value || settings.contact_whatsapp;
        if (wa) {
          document.getElementById('whatsapp-link').href = 'https://wa.me/' + wa.replace(/\D/g, '');
        }
      })
      .catch(() => {});
  </script>

</body>
</html>
